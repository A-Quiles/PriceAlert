<nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center">
        <a
          routerLink="/dashboard"
          class="flex items-center gap-2 group"
          (click)="closeMenu()"
        >
          <div
            class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center group-hover:bg-brand-700 transition-colors"
          >
            <svg
              class="w-5 h-5 text-white"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
              />
            </svg>
          </div>
          <span class="text-xl font-bold text-gray-900"
            >Price<span class="text-brand-600">Alert</span></span
          >
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-1">
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-brand-50 text-brand-700"
          [routerLinkActiveOptions]="{ exact: true }"
          class="px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors"
          (click)="closeMenu()"
        >
          Dashboard
        </a>
        <a
          routerLink="/products"
          routerLinkActive="bg-brand-50 text-brand-700"
          class="px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors"
          (click)="closeMenu()"
        >
          Productos
        </a>
        <a
          routerLink="/alerts"
          routerLinkActive="bg-brand-50 text-brand-700"
          class="relative px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors"
          (click)="closeMenu()"
        >
          Alertas
          @if (triggeredCount > 0) {
            <span
              class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-danger-500 text-white text-xs rounded-full flex items-center justify-center"
            >
              {{ triggeredCount > 9 ? "9+" : triggeredCount }}
            </span>
          }
        </a>
      </div>

      <!-- User Menu -->
      <div class="hidden md:flex items-center gap-3">
        <div class="relative">
          <button
            (click)="toggleMenu()"
            class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100 transition-colors"
          >
            <div
              class="w-7 h-7 bg-brand-600 text-white rounded-full flex items-center justify-center text-xs font-bold"
            >
              {{ userInitial() }}
            </div>
            <span class="max-w-[120px] truncate">{{ auth.user()?.email }}</span>
            <svg
              class="w-4 h-4 transition-transform"
              [class.rotate-180]="menuOpen"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              />
            </svg>
          </button>

          @if (menuOpen) {
            <div
              class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-xl shadow-lg py-1 z-50"
            >
              <a
                routerLink="/settings"
                class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors"
                (click)="closeMenu()"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                </svg>
                Configuración
              </a>
              <div class="border-t border-gray-100 my-1"></div>
              <button
                (click)="signOut(); closeMenu()"
                class="w-full flex items-center gap-2 px-4 py-2 text-sm text-danger-600 hover:bg-danger-50 transition-colors"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                  />
                </svg>
                Cerrar sesión
              </button>
            </div>
          }
        </div>
      </div>

      <!-- Mobile menu button -->
      <div class="flex md:hidden items-center">
        <button
          (click)="toggleMenu()"
          class="p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            @if (menuOpen) {
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            } @else {
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            }
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  @if (menuOpen) {
    <div class="md:hidden border-t border-gray-200 bg-white animate-fade-in">
      <div class="px-4 py-3 space-y-1">
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-brand-50 text-brand-700"
          class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-gray-600"
          (click)="closeMenu()"
          >Dashboard</a
        >
        <a
          routerLink="/products"
          routerLinkActive="bg-brand-50 text-brand-700"
          class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-gray-600"
          (click)="closeMenu()"
          >Productos</a
        >
        <a
          routerLink="/alerts"
          routerLinkActive="bg-brand-50 text-brand-700"
          class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-gray-600"
          (click)="closeMenu()"
        >
          Alertas
          @if (triggeredCount > 0) {
            <span class="badge-danger">{{ triggeredCount }}</span>
          }
        </a>
        <div class="border-t border-gray-100 pt-2 mt-2">
          <div class="px-3 py-2 text-xs text-gray-500">
            {{ auth.user()?.email }}
          </div>
          <button
            (click)="signOut(); closeMenu()"
            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-danger-600 hover:bg-danger-50"
          >
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>
  }
</nav>
